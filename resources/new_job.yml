resources:
  jobs:
    medallion_daily_job_new:
      name: medallion_daily_job_new
      schedule:
        quartz_cron_expression: 0 0 15 * * ?
        timezone_id: Asia/Kolkata
        pause_status: UNPAUSED
      tasks:
        - task_key: bronze_orders
          notebook_task:
            notebook_path: ../src/notebooks/bronze_orders
            base_parameters:
              bronze_schema: bronze
              catalog: dev_dabs
              file_name: orders.csv
              volume_name: dev_dabsvol
              volume_schema: data
            source: WORKSPACE
        - task_key: gold_dim_customer
          depends_on:
            - task_key: silver_orders
          notebook_task:
            notebook_path: ../src/notebooks/gold/dim_customer
            base_parameters:
              catalog: dev_dabs
              gold_schema: gold
              silver_schema: silver
            source: WORKSPACE
        - task_key: gold_dim_date
          depends_on:
            - task_key: silver_orders
          notebook_task:
            notebook_path: ../src/notebooks/gold/dim_date
            base_parameters:
              catalog: dev_dabs
              gold_schema: gold
              silver_schema: silver
            source: WORKSPACE
        - task_key: gold_dim_product
          depends_on:
            - task_key: silver_orders
          notebook_task:
            notebook_path: ../src/notebooks/gold/dim_product
            base_parameters:
              catalog: dev_dabs
              gold_schema: gold
              silver_schema: silver
            source: WORKSPACE
        - task_key: gold_fact_sales
          depends_on:
            - task_key: gold_dim_customer
            - task_key: gold_dim_product
            - task_key: gold_dim_date
          notebook_task:
            notebook_path: ../src/notebooks/gold/fact_sales
            base_parameters:
              catalog: dev_dabs
              gold_schema: gold
              silver_schema: silver
            source: WORKSPACE
        - task_key: silver_orders
          depends_on:
            - task_key: bronze_orders
          notebook_task:
            notebook_path: ../src/notebooks/silver_orders
            base_parameters:
              bronze_schema: bronze
              catalog: dev_dabs
              silver_schema: silver
            source: WORKSPACE
      queue:
        enabled: true
      run_as:
        user_name: saveethas16@gmail.com
