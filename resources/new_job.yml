resources:
  jobs:
    medallion_daily_job_new:
      name: medallion_daily_job_new
      schedule:
        quartz_cron_expression: 0 0 15 * * ?
        timezone_id: Asia/Kolkata
        pause_status: UNPAUSED
      tasks:
        - task_key: bronze_orders
          notebook_task:
            notebook_path: ../src/notebooks/bronze_orders
            base_parameters:
              bronze_schema: "${var.bronze_schema}"
              catalog:  "${var.catalog}"
              file_name: "${var.file_name}"
              volume_name: "${var.volume_name}"
              volume_schema: "${var.volume_schema}"
            source: WORKSPACE
        - task_key: gold_dim_customer
          depends_on:
            - task_key: silver_orders
          notebook_task:
            notebook_path: ../src/notebooks/gold/dim_customer
            base_parameters:
              catalog:  "${var.catalog}"
              gold_schema: "${var.gold_schema}"
              silver_schema: "${var.silver_schema}"
            source: WORKSPACE
        - task_key: gold_dim_date
          depends_on:
            - task_key: silver_orders
          notebook_task:
            notebook_path: ../src/notebooks/gold/dim_date
            base_parameters:
              catalog:  "${var.catalog}"
              gold_schema: "${var.gold_schema}"
              silver_schema: "${var.silver_schema}"
            source: WORKSPACE
        - task_key: gold_dim_product
          depends_on:
            - task_key: silver_orders
          notebook_task:
            notebook_path: ../src/notebooks/gold/dim_product
            base_parameters:
              catalog:  "${var.catalog}"
              gold_schema: "${var.gold_schema}"
              silver_schema: "${var.silver_schema}"
            source: WORKSPACE
        - task_key: gold_fact_sales
          depends_on:
            - task_key: gold_dim_customer
            - task_key: gold_dim_product
            - task_key: gold_dim_date
          notebook_task:
            notebook_path: ../src/notebooks/gold/fact_sales
            base_parameters:
              catalog:  "${var.catalog}"
              gold_schema: "${var.gold_schema}"
              silver_schema: "${var.silver_schema}"
            source: WORKSPACE
        - task_key: silver_orders
          depends_on:
            - task_key: bronze_orders
          notebook_task:
            notebook_path: ../src/notebooks/silver_orders
            base_parameters:
              bronze_schema: "${var.bronze_schema}"
              catalog:  "${var.catalog}"
              silver_schema: "${var.silver_schema}"
            source: WORKSPACE
      queue:
        enabled: true
      run_as:
        user_name: saveethas16@gmail.com
